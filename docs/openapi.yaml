openapi: 3.1.0
info:
  title: Task API
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://task-api-service-f6go.onrender.com
    description: Production server (Replace with your actual URL)

tags:
  - name: Tasks
    description: Task-related endpoints
  - name: Monitoring
    description: Operational endpoints, such as health checks

paths:
  /tasks:
    get:
      summary: List all tasks
      description: Retrieve tasks with optional filtering by completion status
      tags:
        - Tasks
      parameters:
        - name: completed
          in: query
          required: false
          schema:
            type: boolean
          description: |
            Filter tasks by completion status:
            - `true` - returns only completed tasks
            - `false` - returns only incomplete tasks
            - omitted - returns all tasks
          example: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '400':
          description: Bad request due to invalid query parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
              example:
                error: Validation failed
                details:
                  - 'completed must be true, false, or omitted'
    post:
      summary: Create a new task
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request due to invalid data
          content:
            application/json:
              schema:
                type: object{
  "name": "task-api",
  "version": "1.0.0",
  "description": "A simple Node.js + Express + Prisma API for managing tasks",
  "main": "src/server.js",
  "scripts": {
    "dev": "node --env-file=.env --watch src/server.js",
    "start": "node src/server.js",
    "migrate:dev": "npx prisma migrate dev",
    "migrate:deploy": "prisma migrate deploy",
    "seed:dev": "node --env-file=.env prisma/seed.js",
    "seed:prod": "node prisma/seed.js",
    "generate": "prisma generate"
  },
  "keywords": [
    "node",
    "express",
    "prisma",
    "postgres",
    "api",
    "tasks"
  ],
  "author": "",
  "license": "ISC",
  "type": "module",
  "dependencies": {
    "@prisma/adapter-pg": "^7.4.2",
    "@prisma/client": "^7.4.2",
    "cors": "^2.8.6",
    "dotenv": "^17.3.1",
