}
                properties:
                  error:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                example:
                  error: Validation failed
                  details:
                    - 'Title must be at least 3 characters'

  /health:
    get:
      summary: Health Check
      description: Returns the current status of the API. Used by Render to verify that the service is running.
      tags:
        - Monitoring
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        title:
          type: string
          example: Buy groceries
        completed:
          type: boolean
          example: false
      required:
        - title